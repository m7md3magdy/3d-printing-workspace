<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Part Viewer</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

  #header {
    background: #161b22cc;
    backdrop-filter: blur(8px);
    border-bottom: 1px solid #30363d;
    padding: 8px 14px;
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0; z-index: 10; position: relative;
  }
  #header h1 { font-size: 13px; font-weight: 600; color: #58a6ff; }
  .badge { background: #1f6feb33; color: #58a6ff; border: 1px solid #1f6feb66; border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 600; }
  #status { margin-left: auto; font-size: 11px; color: #8b949e; display: flex; align-items: center; gap: 6px; }
  #dot { width: 7px; height: 7px; border-radius: 50%; background: #3fb950; }
  #dot.loading { background: #d29922; animation: pulse 0.8s infinite; }
  #dot.error { background: #f85149; animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  #canvas-wrap { flex: 1; position: relative; }
  canvas { display: block; width: 100% !important; height: 100% !important; }

  #info-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, #0d111799);
    padding: 20px 14px 8px;
    pointer-events: none;
    display: flex; align-items: flex-end; justify-content: space-between;
  }
  #dims { font-size: 11px; color: #8b949e; }
  #dims span { color: #e6edf3; }
  #controls-hint { font-size: 10px; color: #484f58; text-align: right; line-height: 1.6; }

  #loading-screen {
    position: absolute; inset: 0; background: #0d1117;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; z-index: 5;
  }
  #loading-screen.hidden { display: none; }
  .spinner { width: 32px; height: 32px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-text { font-size: 12px; color: #8b949e; }
</style>
</head>
<body>

<div id="header">
  <h1>3D Part Viewer</h1>
  <span class="badge" id="part-name">—</span>
  <div id="status">
    <div id="dot" class="loading"></div>
    <span id="status-text">loading…</span>
  </div>
</div>

<div id="canvas-wrap">
  <div id="loading-screen">
    <div class="spinner"></div>
    <div id="loading-text">Waiting for a part…</div>
  </div>
  <canvas id="c"></canvas>
  <div id="info-overlay">
    <div id="dims">
      Size: <span id="dim-xyz">—</span> &nbsp;|&nbsp;
      Volume: <span id="dim-vol">—</span> &nbsp;|&nbsp;
      Faces: <span id="dim-faces">—</span>
    </div>
    <div id="controls-hint">
      Left drag · rotate<br>
      Right drag · pan<br>
      Scroll · zoom
    </div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Scene setup ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const wrap   = document.getElementById('canvas-wrap');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);
scene.fog = new THREE.Fog(0x0d1117, 300, 600);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
camera.position.set(80, 60, 80);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 5;
controls.maxDistance = 500;
controls.target.set(0, 0, 0);

// ── Lighting ─────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x8ab4f8, 0.6);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffffff, 2.5);
sun.position.set(80, 120, 60);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
scene.add(sun);

const fill = new THREE.DirectionalLight(0x4488ff, 0.8);
fill.position.set(-60, 20, -40);
scene.add(fill);

const rim = new THREE.DirectionalLight(0xffffff, 0.4);
rim.position.set(0, -40, 80);
scene.add(rim);

// ── Grid ─────────────────────────────────────────────────────────────────────
const grid = new THREE.GridHelper(200, 40, 0x21262d, 0x161b22);
grid.material.opacity = 0.6;
grid.material.transparent = true;
scene.add(grid);

// ── Resize handler ───────────────────────────────────────────────────────────
function resize() {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
new ResizeObserver(resize).observe(wrap);
resize();

// ── Render loop ──────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ── STL loading ──────────────────────────────────────────────────────────────
const loader    = new STLLoader();
let   currentMesh = null;
let   lastMtime   = null;
const POLL_MS     = 2500;

const dot        = document.getElementById('dot');
const statusText = document.getElementById('status-text');
const loadScreen = document.getElementById('loading-screen');
const loadText   = document.getElementById('loading-text');

function setStatus(state, text) {
  dot.className = state;   // '', 'loading', 'error'
  statusText.textContent = text;
}

async function loadSTL(base64data, meta) {
  // Decode base64 → ArrayBuffer
  const bin    = atob(base64data);
  const bytes  = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);

  const geometry = loader.parse(bytes.buffer);
  geometry.computeVertexNormals();
  geometry.center();

  // Sit on the grid
  geometry.computeBoundingBox();
  const minY = geometry.boundingBox.min.y;
  geometry.translate(0, -minY, 0);

  // Material
  const mat = new THREE.MeshStandardMaterial({
    color:     0x4a9eff,
    metalness: 0.15,
    roughness: 0.45,
    envMapIntensity: 1.0,
  });

  const mesh = new THREE.Mesh(geometry, mat);
  mesh.castShadow    = true;
  mesh.receiveShadow = true;

  // Swap out old mesh
  if (currentMesh) scene.remove(currentMesh);
  scene.add(mesh);
  currentMesh = mesh;

  // Fit camera to new part
  const box    = new THREE.Box3().setFromObject(mesh);
  const size   = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);

  controls.target.copy(center);
  camera.position.set(
    center.x + maxDim * 1.4,
    center.y + maxDim * 0.9,
    center.z + maxDim * 1.4,
  );
  controls.update();
  grid.position.y = 0;

  // Update overlay info
  document.getElementById('dim-xyz').textContent =
    `${size.x.toFixed(1)} × ${size.y.toFixed(1)} × ${size.z.toFixed(1)} mm`;
  document.getElementById('dim-faces').textContent =
    (geometry.index ? geometry.index.count / 3 : geometry.attributes.position.count / 3)
      .toLocaleString();
  document.getElementById('dim-vol').textContent = meta.volume_cm3
    ? `${meta.volume_cm3} cm³` : '—';

  document.getElementById('part-name').textContent =
    meta.file.replace('_preview.png','').replace('.stl','').replace(/_/g,' ');

  loadScreen.classList.add('hidden');
  setStatus('', `live — updated ${new Date().toLocaleTimeString()}`);
}

async function poll() {
  try {
    const res  = await fetch('/latest-stl');
    if (!res.ok) { setStatus('error', 'server error'); return; }
    const data = await res.json();

    if (!data.file) {
      loadText.textContent = 'No STL yet — run a part script';
      setStatus('loading', 'waiting…');
      return;
    }

    if (data.mtime === lastMtime) return;   // nothing new
    lastMtime = data.mtime;

    setStatus('loading', 'loading part…');
    loadText.textContent = `Loading ${data.file}…`;
    if (!currentMesh) loadScreen.classList.remove('hidden');

    await loadSTL(data.stl_b64, data);
  } catch(e) {
    setStatus('error', 'server unreachable');
  }
}

poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>
